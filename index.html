<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蘇董KTV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:#111827;color:#f9fafb;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
/* top bar */
.topbar{display:flex;align-items:center;padding:10px 14px;background:#1f2937;border-bottom:1px solid #374151;gap:10px;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:#f97316;flex:1}
.topbar button{background:#374151;border:none;color:#e5e7eb;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}

/* player */
#player-wrap{padding:8px 12px 6px;background:#1f2937;flex-shrink:0;display:none}
#player-wrap.show{display:block}
.player-row{display:flex;align-items:center;gap:8px}
#player-yt{flex:1;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;min-width:0}

.controls{display:flex;align-items:center;gap:8px;padding:6px 12px 8px;background:#1f2937;flex-shrink:0}
.btn{background:#374151;border:1px solid #4b5563;color:#e5e7eb;padding:8px 14px;border-radius:10px;font-size:14px;cursor:pointer;min-width:44px;text-align:center}
.btn.active{background:#f97316;color:#fff;border-color:#f97316}
#btn-karaoke{background:#7c3aed;border-color:#7c3aed}
#btn-karaoke.on{background:#a78bfa;color:#fff}
#btn-queue{position:relative}
.queue-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#btn-prev,#btn-next{font-size:18px;padding:8px 12px}
#btn-fullscreen{font-size:18px}

/* search */
.search-row{padding:8px 12px;background:#1f2937;flex-shrink:0;display:flex;gap:8px}
#search-input{flex:1;background:#374151;border:1px solid #4b5563;color:#fff;padding:8px 12px;border-radius:8px;font-size:14px;outline:none}
#search-input::placeholder{color:#9ca3af}

/* song list */
#song-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:4px}
#song-list::-webkit-scrollbar{width:4px}
#song-list::-webkit-scrollbar-thumb{background:#4b5563;border-radius:2px}

.song-item{display:flex;align-items:center;padding:10px 12px;background:#1f2937;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.song-item:active{transform:scale(.97);background:#374151}
.song-item.playing{background:#78350f;border-color:#f97316}
.song-item.playing .song-tags{color:#fed7aa}
.song-item .si-info{flex:1;min-width:0}
.song-item .si-name{font-size:14px;font-weight:600;color:#f9fafb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-item .si-singer{font-size:12px;color:#9ca3af;margin-top:1px}
.song-tags{font-size:10px;color:#6b7280;margin-top:2px}
.si-kar{background:#7c3aed;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:8px;flex-shrink:0;display:none}
.si-kar.show{display:inline}
.si-add{font-size:18px;color:#f97316;padding:4px 8px;flex-shrink:0}

/* queue panel */
#queue-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:#1f2937;border-radius:16px 16px 0 0;max-height:70vh;flex-direction:column;z-index:50;box-shadow:0 -4px 24px rgba(0,0,0,.5)}
#queue-panel.show{display:flex}
.qp-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #374151}
.qp-header h3{flex:1;font-size:15px;color:#e5e7eb}
.qp-close{background:#374151;border:none;color:#e5e7eb;padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer}
.qp-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.qp-item{display:flex;align-items:center;padding:10px 12px;background:#374151;border-radius:8px;gap:10px}
.qp-item .qp-name{flex:1;font-size:13px;font-weight:600;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qp-item .qp-del{color:#ef4444;font-size:16px;padding:4px;cursor:pointer}

/* notification */
.notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#f97316;color:#fff;padding:8px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <h1>🎤 蘇董KTV</h1>
  <button onclick="document.getElementById('song-list').scrollTop=0">TOP</button>
  <button onclick="toggleQueue()">佇列 <span id="queue-count" style="color:#f97316">0</span></button>
</div>

<div id="player-wrap">
  <div class="player-row">
    <div id="player-yt"></div>
  </div>
</div>

<div class="controls" id="ctrl-wrap" style="display:none">
  <button class="btn" id="btn-prev" onclick="prevSong()">⏮</button>
  <button class="btn" id="btn-play" onclick="togglePlay()">▶</button>
  <button class="btn" id="btn-next" onclick="nextSong()">⏭</button>
  <button class="btn active" id="btn-mute" onclick="toggleMute()">🔊</button>
  <button class="btn" id="btn-karaoke" onclick="toggleKaraoke()">🎤 伴奏</button>
  <button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
</div>

<div class="search-row">
  <input id="search-input" placeholder="搜尋歌名、歌手..." oninput="filterSongs()" autocomplete="off">
</div>

<div id="song-list"></div>

<div id="queue-panel">
  <div class="qp-header">
    <h3>播放佇列</h3>
    <button class="qp-close" onclick="clearQueue()">清空</button>
    <button class="qp-close" onclick="toggleQueue()">關閉</button>
  </div>
  <div class="qp-list" id="qp-list"></div>
</div>

<div class="notif" id="notif"></div>

// ===== state =====
var player=null, queue=[], qi=-1, playing=false, muted=false, isKaraoke=false, ytReady=false;

// ===== init =====
function init(){
  renderSongs(SONGS);
  document.getElementById('search-input').focus();
}

function renderSongs(list){
  var el=document.getElementById('song-list');
  el.innerHTML='';
  list.forEach(function(s,i){
    var div=document.createElement('div');
    div.className='song-item';
    div.dataset.i=i;
    div.innerHTML=
      '<div class="si-info">'+
        '<div class="si-name">'+s.name+'</div>'+
        '<div class="si-singer">'+s.singer+'</div>'+
        '<div class="song-tags">'+s.tags+'</div>'+
      '</div>'+
      '<span class="si-kar'+(s.kytid?' show':'')+'">🎤</span>'+
      '<span class="si-add" onclick="event.stopPropagation();addToQueueAndPlay('+i+')">+</span>';
    div.onclick=function(){addToQueueAndPlay(i)};
    el.appendChild(div);
  });
}

function filterSongs(){
  var q=document.getElementById('search-input').value.trim().toLowerCase();
  var filtered=q?SONGS.filter(function(s){return s.name.toLowerCase().includes(q)||s.singer.toLowerCase().includes(q)}):SONGS;
  renderSongs(filtered);
}

// ===== queue =====
function addToQueueAndPlay(i){
  if(qi>=0&&qi<queue.length){
    queue=queue.slice(0,qi+1);
  }
  queue.push(i);
  qi=queue.length-1;
  playCurrent();
  playAud(aud_add);
  toast('已點播：'+SONGS[i].name);
  updateQueueUI();
}

function updateQueueUI(){
  document.getElementById('queue-count').textContent=queue.length;
  var el=document.getElementById('qp-list');
  el.innerHTML='';
  queue.forEach(function(si,idx){
    var div=document.createElement('div');
    div.className='qp-item';
    var cur=(idx===qi)?'color:#f97316;font-weight:700':'';
    div.innerHTML='<span class="qp-name" style="'+cur+'">'+(idx+1)+'. '+SONGS[si].name+' - '+SONGS[si].singer+'</span><span class="qp-del" onclick="delQueue('+idx+')">✕</span>';
    el.appendChild(div);
  });
}

function delQueue(idx){
  queue.splice(idx,1);
  if(qi>=idx){qi=Math.max(0,qi-1);}
  updateQueueUI();
  toast('已刪除');
}

function clearQueue(){
  queue=[];qi=-1;
  updateQueueUI();
  toast('佇列已清空');
}

function toggleQueue(){
  document.getElementById('queue-panel').classList.toggle('show');
}

function prevSong(){
  if(qi>0){qi--;playCurrent();}
}
function nextSong(){
  if(qi<queue.length-1){qi++;playCurrent();}else{
    toast('佇列已播完');
    playAud(aud_nowplay);
  }
}

// ===== player core =====
function playCurrent(){
  if(qi<0||qi>=queue.length)return;
  var s=SONGS[queue[qi]];

  document.getElementById('ctrl-wrap').style.display='flex';
  document.getElementById('player-wrap').classList.add('show');

  var ytid=isKaraoke&&s.kytid?s.kytid:s.ytid;
  var label=isKaraoke&&s.kytid?'🎤 伴奏':'🔊 原唱';

  if(!player){
    var div=document.createElement('div');
    div.id='player-div';
    document.getElementById('player-yt').appendChild(div);
    var tag=document.createElement('script');
    tag.src='https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady=function(){createPlayer(ytid,s.name+' - '+s.singer,label)};
  } else {
    player.loadVideoById(ytid);
    document.getElementById('ctrl-wrap').querySelector('#btn-play').textContent='⏸';
    playing=true;
  }

  updateQueueUI();
  updateKaraokeBtn();
  document.getElementById('player-yt').scrollIntoView({behavior:'smooth',block:'nearest'});
  playAud(aud_nowplay);
}

function createPlayer(vidId,title,label){
  player=new YT.Player('player-div',{
    height:'100%',width:'100%',
    videoId:vidId,
    playerVars:{autoplay:1,playsinline:1,controls:1},
    events:{
      onReady:function(e){e.target.setVolume(80);ytReady=true},
      onStateChange:function(e){
        if(e.data===0&&playing){nextSong();}
        if(e.data===1){playing=true;document.getElementById('btn-play').textContent='⏸';}
        if(e.data===2){playing=false;document.getElementById('btn-play').textContent='▶';}
      }
    }
  });
}

function togglePlay(){
  if(!player||!ytReady)return;
  if(playing){player.pauseVideo();playing=false;document.getElementById('btn-play').textContent='▶';}
  else{player.playVideo();playing=true;document.getElementById('btn-play').textContent='⏸';}
}

function toggleMute(){
  muted=!muted;
  if(player)player.mute();
  document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';
  document.getElementById('btn-mute').classList.toggle('active',!muted);
  if(player)muted?player.mute():player.unMute();
}

function toggleKaraoke(){
  if(qi<0)return;
  var s=SONGS[queue[qi]];
  if(!s.kytid){toast('這首沒有伴奏版');return;}
  isKaraoke=!isKaraoke;
  var ytid=isKaraoke?s.kytid:s.ytid;
  if(player&&ytReady){
    player.loadVideoById(ytid);
    var label=isKaraoke?'🎤 伴奏':'🔊 原唱';
    toast(label+'：'+s.name);
  }
  updateKaraokeBtn();
}

function updateKaraokeBtn(){
  var btn=document.getElementById('btn-karaoke');
  var s=SONGS[queue[qi]];
  if(s.kytid){
    btn.style.display='inline';
    btn.classList.toggle('on',isKaraoke);
    btn.textContent=isKaraoke?'🔊 原唱':'🎤 伴奏';
  } else {
    btn.style.display='none';
  }
}

function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){});}
  else{document.exitFullscreen().catch(function(){});}
}

// ===== init =====
init();
</script>
