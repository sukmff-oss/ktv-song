<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎤 蘇董KTV</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0A0E17; --surface:#111827; --card:#1a2332;
  --primary:#00D4FF; --secondary:#7B61FF; --accent:#FF6B6B;
  --gold:#FFD700; --text:#E8F0FE; --muted:#8899AA;
  --radius:16px;
}
body { font-family:'PingFang HK','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* 背景 */
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.08) 0%, transparent 60%),
  radial-gradient(ellipse at 80% 80%, rgba(123,97,255,0.08) 0%, transparent 60%); pointer-events:none; z-index:0; }

#app { max-width:600px; margin:0 auto; padding-bottom:100px; position:relative; z-index:1; }

/* 抬頭 */
header { background:linear-gradient(135deg,var(--surface) 0%,#0f1724 100%); padding:16px 20px; border-bottom:1px solid rgba(0,212,255,0.2); position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:20px; font-weight:700; background:linear-gradient(90deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
header button { background:rgba(0,212,255,0.15); border:1px solid rgba(0,212,255,0.3); color:var(--primary); font-size:12px; font-family:inherit; padding:6px 12px; border-radius:20px; cursor:pointer; }

/* 搜尋 */
.search-box { padding:14px 16px; position:sticky; top:58px; background:var(--bg); z-index:90; }
.search-box input { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; color:var(--text); font-size:15px; font-family:inherit; outline:none; transition:border 0.2s; }
.search-box input:focus { border-color:var(--primary); }
.search-box input::placeholder { color:var(--muted); }

/* 曲目列表 */
.song-list { padding:0 16px; }
.song-card { background:var(--card); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
.song-card:hover { border-color:var(--primary); transform:translateY(-1px); }
.song-card:active { transform:scale(0.97); }
.song-thumb { width:52px; height:52px; border-radius:10px; background:var(--surface); flex-shrink:0; overflow:hidden; }
.song-thumb img { width:100%; height:100%; object-fit:cover; }
.song-info { flex:1; min-width:0; }
.song-name { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-singer { font-size:12px; color:var(--muted); margin-top:3px; }
.song-tags { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.tag { background:rgba(0,212,255,0.12); color:var(--primary); font-size:10px; padding:2px 7px; border-radius:20px; }
.add-btn { background:linear-gradient(135deg,var(--primary),#0099CC); color:#000; border:none; border-radius:20px; padding:8px 16px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.2s; }
.add-btn:active { transform:scale(0.93); }
.add-btn.done { background:var(--surface); color:var(--muted); border:1px solid rgba(255,255,255,0.1); }

/* 佇列面板 */
.queue-panel { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:600px; background:rgba(17,24,39,0.97); backdrop-filter:blur(20px); border-top:1px solid rgba(0,212,255,0.2); z-index:200; padding:0 16px; max-height:70vh; display:flex; flex-direction:column; }
.queue-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; flex-shrink:0; }
.queue-header h3 { font-size:15px; font-weight:700; color:var(--primary); }
.queue-count { background:var(--primary); color:#000; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; }
.queue-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }
.queue-content { overflow-y:auto; flex:1; padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
.queue-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.queue-num { font-size:12px; color:var(--muted); width:22px; text-align:center; flex-shrink:0; }
.queue-num.playing { color:var(--primary); font-weight:700; font-size:15px; }
.queue-info { flex:1; min-width:0; }
.queue-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.queue-singer { font-size:11px; color:var(--muted); }
.queue-del { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px 8px; flex-shrink:0; }
.queue-del:hover { color:var(--accent); }
.queue-empty { text-align:center; padding:20px; color:var(--muted); font-size:13px; }

/* 迷你播放器 */
.mini-player { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:568px; background:var(--card); border:1px solid rgba(0,212,255,0.2); border-radius:16px; padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; z-index:190; box-shadow:0 8px 32px rgba(0,0,0,0.4); transition:transform 0.2s; }
.mini-player:active { transform:translateX(-50%) scale(0.98); }
.mini-thumb { width:42px; height:42px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface); }
.mini-thumb img { width:100%; height:100%; object-fit:cover; }
.mini-info { flex:1; min-width:0; }
.mini-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-singer { font-size:11px; color:var(--muted); }
.mini-btn { background:linear-gradient(135deg,var(--primary),#0099CC); color:#000; border:none; border-radius:50%; width:36px; height:36px; font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

/* 分類標籤 */
.tags-filter { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; }
.tags-filter::-webkit-scrollbar { display:none; }
.tag-btn { background:var(--card); border:1px solid rgba(255,255,255,0.1); color:var(--muted); padding:6px 14px; border-radius:20px; font-size:12px; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.2s; }
.tag-btn.active { background:rgba(0,212,255,0.2); border-color:var(--primary); color:var(--primary); }

/* 播放器全屏 */
.player-full { position:fixed; inset:0; background:#000; z-index:300; display:flex; flex-direction:column; }
.player-full-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; flex-shrink:0; }
.player-full-close { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:4px; }
.player-full-title { font-size:14px; font-weight:600; text-align:center; flex:1; }
.player-full-sub { font-size:11px; color:var(--muted); text-align:center; margin-top:2px; }
#player-yt { flex:1; background:#000; min-height:0; }
.player-full-btns { display:flex; justify-content:center; gap:16px; padding:12px; flex-shrink:0; }
.player-full-btn { background:none; border:1px solid rgba(255,255,255,0.2); color:#fff; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; transition:all 0.2s; }
.player-full-btn:active { transform:scale(0.9); }
.player-full-btn.main { background:var(--primary); border-color:var(--primary); color:#000; font-size:22px; }
.player-full-btn.skip { font-size:14px; }
.player-full-btn.rm { color:var(--accent); border-color:var(--accent); }

/* 歌詞 */
.lyrics-panel { background:var(--card); border-radius:var(--radius); padding:14px; margin:0 16px 12px; max-height:160px; overflow-y:auto; }
.lyric-line { font-size:14px; color:var(--muted); text-align:center; line-height:2; transition:all 0.3s; padding:2px 0; }
.lyric-line.active { color:var(--primary); font-size:16px; font-weight:700; }

/* 通知 */
.notif { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--card); border:1px solid var(--primary); color:var(--text); padding:10px 20px; border-radius:30px; font-size:13px; z-index:9999; transition:transform 0.3s; white-space:nowrap; }
.notif.show { transform:translateX(-50%) translateY(0); }

/* 音符動畫 */
.note { position:fixed; pointer-events:none; z-index:50; font-size:24px; animation:flyUp 1.2s ease-out forwards; }
@keyframes flyUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-100px) scale(0.4);opacity:0} }

/* 無歌曲 */
.no-song { text-align:center; padding:40px; color:var(--muted); }
.no-song .icon { font-size:48px; margin-bottom:12px; }

/* 載入中 */
.loading { display:flex; justify-content:center; padding:40px; }
.spinner { width:32px; height:32px; border:3px solid rgba(0,212,255,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎤 蘇董KTV</h1>
    <button onclick="toggleQueue()">📋 佇列 (<span id="hdr-count">0</span>)</button>
  </header>

  <div class="search-box">
    <input type="text" id="search" placeholder="搜尋歌曲或歌手..." autocomplete="off">
  </div>

  <div class="tags-filter" id="tags-filter"></div>
  <div class="song-list" id="song-list"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- 迷你播放器 -->
<div class="mini-player" id="mini-player" style="display:none" onclick="openFullPlayer()">
  <div class="mini-thumb" id="mini-thumb"></div>
  <div class="mini-info">
    <div class="mini-title" id="mini-title">等待點歌...</div>
    <div class="mini-singer" id="mini-singer"></div>
  </div>
  <button class="mini-btn" id="mini-play-btn" onclick="event.stopPropagation();playNextFromQueue()">▶</button>
</div>

<!-- 佇列面板 -->
<div id="queue-panel" style="display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:rgba(17,24,39,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,212,255,0.2);z-index:200;max-height:70vh;flex-direction:column;padding:0 16px;">
  <div class="queue-header">
    <h3>📋 播放佇列</h3>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="queue-count" id="queue-count">0</span>
      <button onclick="clearQueue()" style="background:none;border:1px solid rgba(255,107,107,0.4);color:var(--accent);font-size:11px;font-family:inherit;padding:4px 10px;border-radius:20px;cursor:pointer;">清空</button>
      <button class="queue-close" onclick="toggleQueue()">✕</button>
    </div>
  </div>
  <div class="queue-content" id="queue-list">
    <div class="queue-empty">佇列是空的，去點歌吧！</div>
  </div>
</div>

<!-- 全屏播放器 -->
<div id="player-full" class="player-full" style="display:none">
  <div class="player-full-header">
    <button class="player-full-close" onclick="closeFullPlayer()">✕</button>
    <div>
      <div class="player-full-title" id="pf-title">-</div>
      <div class="player-full-sub" id="pf-singer">-</div>
    </div>
    <div style="width:40px;"></div>
  </div>
  <div id="player-yt"></div>
  <div class="lyrics-panel" id="lyrics-yt">
    <div class="lyric-line active">🎶 選擇歌曲開始歡唱 🎶</div>
  </div>
  <div class="player-full-btns">
    <button class="player-full-btn rm" onclick="removeCurrentAndNext()">🗑</button>
    <button class="player-full-btn" onclick="playPrevFromQueue()">⏮</button>
    <button class="player-full-btn main" id="pf-play" onclick="togglePlay()">▶</button>
    <button class="player-full-btn skip" onclick="playNextFromQueue()">⏭</button>
    <button class="player-full-btn" onclick="addRandom()">🔀</button>
  </div>
</div>

<!-- 通知 -->
<div class="notif" id="notif"></div>

};

function loadYouTubeAPI() {
  if (window.YT && window.YT.Player) { initYT(); return; }
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
window.onYouTubeIframeAPIReady = initYT;

function initYT() {
  if (document.getElementById('player-yt').children.length > 0) return;
  player = new YT.Player('player-yt', {
    events: { 'onStateChange': onStateChange, 'onError': function(){ toast('影片播放失敗'); playNextFromQueue(); } }
  });
}

function onStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) { playNextFromQueue(); }
  if (e.data === YT.PlayerState.PLAYING) { isPlaying = true; playStartMs = Date.now(); document.getElementById('pf-play').textContent = '⏸'; }
  if (e.data === YT.PlayerState.PAUSED) { isPlaying = false; document.getElementById('pf-play').textContent = '▶'; }
}

// ===== 搜尋/分類 =====
function renderTags() {
  var allTags = {};
  SONGS.forEach(function(s){ allTags[s.tags||'國語'] = (allTags[s.tags||'國語']||0)+1; });
  var tags = Object.keys(allTags).sort();
  var html = '<button class="tag-btn active" onclick="setTag(\'\')">全部 ('+SONGS.length+')</button>';
  tags.forEach(function(t){ html += '<button class="tag-btn" onclick="setTag(\''+t+'\')">'+t+' ('+allTags[t]+')</button>'; });
  document.getElementById('tags-filter').innerHTML = html;
}

function setTag(tag) {
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(function(b){ b.classList.remove('active'); });
  event.currentTarget.classList.add('active');
  filterSongs();
}

function filterSongs() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  var filtered = SONGS.filter(function(s){
    if (currentTag && s.tags !== currentTag) return false;
    if (!q) return true;
    return s.name.toLowerCase().indexOf(q)!==-1 || s.singer.toLowerCase().indexOf(q)!==-1;
  });
  renderSongList(filtered);
}

function renderSongList(list) {
  var el = document.getElementById('song-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="no-song"><div class="icon">🔍</div>查無歌曲</div>';
    return;
  }
  el.innerHTML = list.map(function(s,i) {
    return '<div class="song-card" onclick="addToQueueAndPlay('+SONGS.indexOf(s)+')">\
      <div class="song-thumb"><img src="https://img.youtube.com/vi/'+s.ytid+'/mqdefault.jpg" onerror="this.parentElement.innerHTML=\'🎵\'"></div>\
      <div class="song-info">\
        <div class="song-name">'+s.name+'</div>\
        <div class="song-singer">'+s.singer+'</div>\
        <div class="song-tags">'+(s.tags?'<span class="tag">'+s.tags+'</span>':'')+'</div>\
      </div>\
      <button class="add-btn" id="ab-'+i+'" onclick="event.stopPropagation();addToQueueAndPlay('+SONGS.indexOf(s)+')">＋</button>\
    </div>';
  }).join('');
}

// ===== 點歌 =====
function addToQueueAndPlay(idx) {
  var s = SONGS[idx];
  // 如果佇列已有這首歌，先刪掉再放到最後
  var existing = queue.findIndex(function(q){ return q.ytid === s.ytid; });
  if (existing >= 0) queue.splice(existing, 1);
  queue.push({name:s.name, singer:s.singer, ytid:s.ytid});
  saveQueue();
  updateQueueUI();
  spawnNote(event.currentTarget || document.body);
  toast('已點播：' + s.name);
  
  // 立即播放這首
  currentSongIdx = queue.length - 1;
  playSong(queue[currentSongIdx]);
  localStorage.setItem('ktv_now', currentSongIdx);
}

function addRandom() {
  var idx = Math.floor(Math.random() * SONGS.length);
  addToQueueAndPlay(idx);
}

// ===== 播放 =====
function playSong(s) {
  if (!s) return;
  document.getElementById('pf-title').textContent = s.name;
  document.getElementById('pf-singer').textContent = s.singer;
  document.getElementById('mini-title').textContent = s.name;
  document.getElementById('mini-singer').textContent = s.singer;
  document.getElementById('mini-thumb').innerHTML = '<img src="https://img.youtube.com/vi/'+s.ytid+'/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;">';
  document.getElementById('mini-player').style.display = 'flex';
  document.getElementById('lyrics-yt').innerHTML = '<div class="lyric-line active">'+s.name+' - '+s.singer+'</div>';

  if (player && player.loadVideoById) {
    player.loadVideoById(s.ytid);
    playStartMs = Date.now();
  } else {
    loadYouTubeAPI();
    setTimeout(function(){
      if (player && player.loadVideoById) player.loadVideoById(s.ytid);
    }, 1500);
  }
  updateQueueUI();
}

function playNextFromQueue() {
  if (currentSongIdx < queue.length - 1) {
    currentSongIdx++;
    playSong(queue[currentSongIdx]);
    localStorage.setItem('ktv_now', currentSongIdx);
  } else {
    toast('佇列已播完 🎉');
    isPlaying = false;
  }
}

function playPrevFromQueue() {
  if (currentSongIdx > 0) {
    currentSongIdx--;
    playSong(queue[currentSongIdx]);
    localStorage.setItem('ktv_now', currentSongIdx);
  }
}

function togglePlay() {
  if (!player) return;
  if (isPlaying) { player.pauseVideo(); isPlaying = false; document.getElementById('pf-play').textContent = '▶'; }
  else { player.playVideo(); isPlaying = true; document.getElementById('pf-play').textContent = '⏸'; playStartMs = Date.now(); }
}

function removeCurrentAndNext() {
  if (currentSongIdx < 0) return;
  queue.splice(currentSongIdx, 1);
  if (currentSongIdx >= queue.length) currentSongIdx = queue.length - 1;
  saveQueue();
  updateQueueUI();
  if (queue.length > 0 && currentSongIdx >= 0) {
    playSong(queue[currentSongIdx]);
    localStorage.setItem('ktv_now', currentSongIdx);
  } else {
    closeFullPlayer();
    document.getElementById('mini-player').style.display = 'none';
    currentSongIdx = -1;
    localStorage.removeItem('ktv_now');
  }
  toast('已刪除');
}

// ===== 佇列管理 =====
function saveQueue() {
  localStorage.setItem('ktv_q', JSON.stringify(queue));
}

function updateQueueUI() {
  document.getElementById('queue-count').textContent = queue.length;
  document.getElementById('hdr-count').textContent = queue.length;
  var list = document.getElementById('queue-list');
  if (queue.length === 0) {
    list.innerHTML = '<div class="queue-empty">佇列是空的，去點歌吧！</div>';
    return;
  }
  list.innerHTML = queue.map(function(s, i) {
    return '<div class="queue-item">\
      <div class="queue-num '+(i===currentSongIdx?'playing':'')+'">'+(i===currentSongIdx?'▶':(i+1))+'</div>\
      <div class="queue-info">\
        <div class="queue-name">'+s.name+'</div>\
        <div class="queue-singer">'+s.singer+'</div>\
      </div>\
      <button class="queue-del" onclick="delQueueItem('+i+')">✕</button>\
    </div>';
  }).join('');
}

function delQueueItem(idx) {
  if (idx === currentSongIdx) {
    toast('正在播放的歌曲無法刪除');
    return;
  }
  queue.splice(idx, 1);
  if (currentSongIdx > idx) currentSongIdx--;
  saveQueue();
  updateQueueUI();
  toast('已刪除');
}

function clearQueue() {
  if (!confirm('確定清空佇列？')) return;
  queue = [];
  currentSongIdx = -1;
  saveQueue();
  updateQueueUI();
  closeFullPlayer();
  document.getElementById('mini-player').style.display = 'none';
  localStorage.removeItem('ktv_now');
  toast('佇列已清空');
}

function toggleQueue() {
  var panel = document.getElementById('queue-panel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

// ===== 全屏播放器 =====
function openFullPlayer() {
  document.getElementById('player-full').style.display = 'flex';
  if (!player) loadYouTubeAPI();
  else if (currentSongIdx >= 0 && queue[currentSongIdx]) playSong(queue[currentSongIdx]);
}

function closeFullPlayer() {
  document.getElementById('player-full').style.display = 'none';
}

// ===== 通知 =====
function toast(msg) {
  var t = document.getElementById('notif');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function spawnNote(el) {
  try {
    var rect = (el||document.body).getBoundingClientRect();
    var n = document.createElement('div');
    n.className = 'note';
    n.textContent = '🎵';
    n.style.left = (rect.left + rect.width/2 - 12) + 'px';
    n.style.top = rect.top + 'px';
    document.body.appendChild(n);
    setTimeout(function(){ n.remove(); }, 1200);
  } catch(e){}
}

function debounce(fn, d) {
  var t;
  return function(){ clearTimeout(t); t = setTimeout(function(){ fn.apply(null, arguments); }, d); };
}

// 點外面關閉佇列
document.addEventListener('click', function(e) {
  var panel = document.getElementById('queue-panel');
  var btn = document.querySelector('header button');
  if (panel.style.display !== 'none' && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = 'none';
  }
});
</script>
</body>
</html>
