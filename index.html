<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蘇董KTV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:#111827;color:#f9fafb;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
/* top bar */
.topbar{display:flex;align-items:center;padding:10px 14px;background:#1f2937;border-bottom:1px solid #374151;gap:10px;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:#f97316;flex:1}
.topbar button{background:#374151;border:none;color:#e5e7eb;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.kar-badge{background:#7c3aed;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;margin-left:6px;display:none}
.kar-badge.show{display:inline}

/* search */
.search-row{padding:8px 12px;background:#1f2937;flex-shrink:0}
#search-input{width:100%;background:#374151;border:1px solid #4b5563;color:#fff;padding:10px 14px;border-radius:10px;font-size:15px;outline:none}

/* song list */
#song-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
#song-list::-webkit-scrollbar{width:4px}
#song-list::-webkit-scrollbar-thumb{background:#4b5563;border-radius:2px}

.song-item{display:flex;align-items:center;padding:12px 14px;background:#1f2937;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.song-item:active{transform:scale(.97);background:#374151}
.song-item.playing{background:#78350f;border-color:#f97316}
.si-icon{font-size:26px;margin-right:12px;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:15px;font-weight:600;color:#f9fafb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
.si-singer{font-size:12px;color:#9ca3af;margin-top:2px}
.si-tags{font-size:10px;color:#6b7280;margin-top:2px}
.si-arrow{font-size:20px;color:#f97316;padding:6px;flex-shrink:0}

/* now playing bar */
#np-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#1f2937;border-radius:16px 16px 0 0;padding:12px 16px;z-index:50;box-shadow:0 -4px 24px rgba(0,0,0,.5);border-top:1px solid #374151}
#np-bar.show{display:block}
.np-row{display:flex;align-items:center;gap:12px}
.np-icon{font-size:30px}
.np-info{flex:1;min-width:0}
.np-name{font-size:14px;font-weight:700;color:#f9fafb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-singer{font-size:12px;color:#9ca3af}
.np-btns{display:flex;gap:8px}
.np-btn{background:#374151;border:1px solid #4b5563;color:#e5e7eb;width:44px;height:44px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.np-btn.kar{background:#7c3aed;border-color:#7c3aed;display:none}
.np-btn.kar.show{display:flex}
.np-btn.yt{background:#ff0000;border-color:#ff0000;font-size:11px;font-weight:700;color:#fff}

/* mode toggle */
.mode-toggle{display:flex;background:#374151;border-radius:10px;padding:3px;gap:2px;flex-shrink:0}
.mode-toggle button{background:none;border:none;color:#9ca3af;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer}
.mode-toggle button.active{background:#f97316;color:#fff}

/* notification */
.notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#f97316;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1}
.notif.kar{background:#7c3aed}

/* hint */
.hint{text-align:center;padding:16px;font-size:12px;color:#6b7280;flex-shrink:0}
</style>
</head>
<body>

<div class="topbar">
  <h1>🎤 蘇董KTV</h1>
  <div class="mode-toggle">
    <button id="mode-orig" class="active" onclick="setMode('orig')">🔊 原唱</button>
    <button id="mode-kar" onclick="setMode('kar')">🎤 伴奏</button>
  </div>
  <button onclick="document.getElementById('song-list').scrollTop=0">TOP</button>
</div>

<div class="search-row">
  <input id="search-input" placeholder="搜尋歌名、歌手..." oninput="render()" autocomplete="off">
</div>

<div id="song-list"></div>

<div class="hint">💡 點歌直接開 YouTube 播放</div>

<div id="np-bar">
  <div class="np-row">
    <div class="np-icon">🎵</div>
    <div class="np-info">
      <div class="np-name" id="np-name">-</div>
      <div class="np-singer" id="np-singer">-</div>
    </div>
    <div class="np-btns">
      <button class="np-btn kar" id="np-kar" onclick="switchKar()">🎤</button>
      <button class="np-btn yt" id="np-yt" title="YouTube 開新分頁" onclick="openYT()">YT</button>

</div>

function toast(msg, kar){
  var t=document.getElementById('notif');
  t.className='notif'+(kar?' kar':'');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2200);
}

function setMode(m){
  mode=m;
  document.getElementById('mode-orig').classList.toggle('active',m==='orig');
  document.getElementById('mode-kar').classList.toggle('active',m==='kar');
  render();
  toast(m==='kar'?'🎤 切換為伴奏模式':'🔊 切換為原唱模式', m==='kar');
}

function render(){
  var q=document.getElementById('search-input').value.trim().toLowerCase();
  var list=SONGS;
  if(q){
    list=SONGS.filter(function(s){
      return s.name.toLowerCase().includes(q)||s.singer.toLowerCase().includes(q);
    });
  }
  var el=document.getElementById('song-list');
  el.innerHTML='';
  list.forEach(function(s){
    var vid=(mode==='kar'&&s.kytid)?s.kytid:s.ytid;
    var div=document.createElement('div');
    div.className='song-item'+(lastSong&&lastSong.ytid===vid?' playing':'');
    var hasKar=!!s.kytid;
    div.innerHTML=
      '<div class="si-icon">'+(hasKar?'🎤':'🎵')+'</div>'+
      '<div class="si-info">'+
        '<div class="si-name">'+s.name+'<span class="kar-badge'+(hasKar&&mode==='orig'?' show':'')+'">伴奏</span></div>'+
        '<div class="si-singer">'+s.singer+'</div>'+
        '<div class="si-tags">'+s.tags+'</div>'+
      '</div>'+
      '<div class="si-arrow">▶</div>';
    div.onclick=function(){play(s,vid)};
    el.appendChild(div);
  });
}

function play(s,vid){
  lastSong={name:s.name,singer:s.singer,ytid:s.ytid,kytid:s.kytid,vid:vid};
  document.getElementById('np-name').textContent=s.name;
  document.getElementById('np-singer').textContent=s.singer;
  var kar=document.getElementById('np-kar');
  kar.className='np-btn kar'+(s.kytid?' show':'');
  document.getElementById('np-bar').classList.add('show');
  render();
  // Open YouTube in new tab
  var url='https://youtu.be/'+vid;
  window.open(url,'_blank');
  var label=(mode==='kar'&&s.kytid)?'伴奏':'原唱';
  toast('▶ '+label+'：'+s.name+' — '+s.singer, mode==='kar');
}

function switchKar(){
  if(!lastSong||!lastSong.kytid)return;
  var newMode=mode==='orig'?'kar':'orig';
  setMode(newMode);
  var s=lastSong;
  var vid=(newMode==='kar')?s.kytid:s.ytid;
  window.open('https://youtu.be/'+vid,'_blank');
  var label=newMode==='kar'?'🎤 伴奏':'🔊 原唱';
  document.getElementById('np-name').textContent=s.name;
  document.getElementById('np-singer').textContent=s.singer;
  toast('▶ '+label+'：'+s.name+' — '+s.singer, newMode==='kar');
}

function openYT(){
  if(!lastSong)return;
  var vid=(mode==='kar'&&lastSong.kytid)?lastSong.kytid:lastSong.ytid;
  window.open('https://youtu.be/'+vid,'_blank');
}
